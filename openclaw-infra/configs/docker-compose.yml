# ============================================================
# OpenClaw Docker Compose 生产配置
# 课程：AI 业务流架构师 · 第二节课
# ============================================================

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    ports:
      # ❶ 只绑定本机，不暴露到公网（安全第一道防线）
      - "127.0.0.1:18789:18789"
    volumes:
      # 命名卷持久化数据（SOUL.md、记忆、会话等你的主权资产）
      - openclaw-data:/root/.openclaw
    env_file:
      # ❷ 敏感信息（API Key 等）从 .env 文件注入，不硬编码
      # 支持 OpenAI 兼容格式：OPENAI_API_KEY + OPENAI_BASE_URL
      - .env
    restart: unless-stopped  # ❸ 崩溃自动重启，手动 stop 不会拉回
    logging:
      driver: json-file
      options:
        max-size: "10m"      # 单个日志文件最大 10MB
        max-file: "3"        # 最多保留 3 个日志文件

volumes:
  openclaw-data:
    driver: local
